<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* VIDEO DE FUNDO */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* camada escura para estética */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* CONTEÚDO */

.container{
padding:40px 20px;
max-width:700px;
margin:auto;
}

/* TEXTO */

h2{
font-size:22px;
margin-top:40px;
}

p{
font-size:20px;
margin-top:25px;
}

/* IMAGENS */

.tomate{
width:90%;
max-width:420px;
margin:18px auto;
display:block;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:transform 0.2s;
}

.tomate:active{
transform:scale(0.95);
}

/* BOTÃO SOM */

.sound-button{
margin-top:35px;
padding:14px 22px;
font-size:16px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<video autoplay muted loop playsinline class="video-bg">
<source src="YTDwn.com_YouTube_Benson-Boone-Beautiful.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<h2>eu ouvi que vse ama tomates?</h2>

<img src="image1.png" class="tomate">

<img src="image2.png" class="tomate">

<p>rsrsrsrsrsr gwstou dos meus tomates mwu benzinho??</p>

<img src="image3.png" class="tomate">

<button class="sound-button" onclick="tocarSom()">ativar som</button>

</div>

<audio id="audio">
<source src="YTDwn.com_Shorts_pinto-de-cachorro-assado.mp3" type="audio/mpeg">
</audio>

<script>

function tocarSom(){
document.getElementById("audio").play();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>teste do susaki</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
background:black;
}

/* VIDEO FUNDO */

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
}

/* BLUR INICIAL */

#blur{
position:fixed;
width:100%;
height:100vh;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
transition:0.5s;
}

/* CONTEUDO */

#conteudo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
}

h1{
font-size:60px;
margin-bottom:40px;
}

/* ICONES */

.icons{
display:flex;
gap:50px;
justify-content:center;
}

.icons img{
width:90px;
cursor:pointer;
transition:0.3s;
}

.icons img:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div id="blur">
Toque para continuar
</div>

<div id="conteudo">

<h1>teste do susaki</h1>

<div class="icons">

<a href="https://www.roblox.com" target="_blank">
<img src="https://tr.rbxcdn.com/180DAY-57c6c93c2c91e0c59f5b4e27c0a16e33/420/420/Image/Webp/noFilter">
</a>

<a href="https://www.youtube.com" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

</div>

</div>

<script>

document.getElementById("blur").onclick = function(){

this.style.opacity="0"

setTimeout(()=>{
this.style.display="none"
document.getElementById("conteudo").style.display="block"
},500)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>para regina</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* tela de loading */

#loading{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

#percent{
font-size:50px;
margin-bottom:30px;
}

#click{
padding:15px 40px;
font-size:20px;
background:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* coração */

#heart{
display:none;
font-size:120px;
cursor:pointer;
animation:pulse 1.2s infinite;
}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}

}

/* tela final */

#final{
display:none;
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

#videoBg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(60%);
}

/* fundo blur bonito */

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,0.8),
rgba(0,0,0,0.2)
);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.title{
font-size:45px;
margin-bottom:20px;
font-weight:600;
}

.text{
font-size:22px;
max-width:700px;
line-height:1.5;
opacity:0.9;
}

</style>
</head>

<body>

<!-- loading -->

<div id="loading">

<div id="percent">0%</div>

<button id="click">clique</button>

</div>

<!-- coração -->

<div id="heart">❤</div>

<!-- tela final -->

<div id="final">

<video id="videoBg" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">

<div class="title">
um site para regina apenas para ela ❤
</div>

<div class="text">
se você está vendo isso, é porque alguém fez algo simples,
mas pensado especialmente para você.
</div>

</div>

<audio id="music" src="audio.mp3"></audio>

</div>

<script>

let percent = 0

const btn = document.getElementById("click")
const text = document.getElementById("percent")
const heart = document.getElementById("heart")

btn.onclick = () =>{

percent += 5

if(percent > 100) percent = 100

text.innerText = percent + "%"

if(percent == 100){

document.getElementById("loading").style.display="none"

heart.style.display="block"

}

}

heart.onclick = () =>{

heart.style.display="none"

document.getElementById("final").style.display="block"

const music = document.getElementById("music")

music.play()

}

</script>

</body>
</html>

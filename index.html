<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste do Susaki</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
overflow:hidden;
background:black;
color:white;
}

/* TELA INICIAL BLUR */

#startScreen{
position:fixed;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(25px);
background:rgba(0,0,0,0.4);
z-index:10;
cursor:pointer;
transition:0.6s;
}

#startText{
font-size:40px;
font-weight:bold;
text-shadow:0 0 20px white;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

/* VIDEO FUNDO */

#videoBackground{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
}

/* CONTEUDO */

#content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0;
transition:1s;
}

h1{
font-size:60px;
margin-bottom:40px;
text-shadow:0 0 20px black;
}

/* ICONES */

.icons{
display:flex;
gap:40px;
justify-content:center;
}

.icon{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:20px;
width:150px;
transition:0.3s;
cursor:pointer;
backdrop-filter:blur(10px);
}

.icon:hover{
transform:scale(1.1);
background:rgba(0,0,0,0.8);
}

.icon img{
width:80px;
margin-bottom:10px;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="videoBackground">
<source src="video.mp4" type="video/mp4">
</video>

<!-- BLUR INICIAL -->
<div id="startScreen">
<div id="startText">Toque para continuar</div>
</div>

<!-- CONTEUDO -->
<div id="content">

<h1>teste do susaki</h1>

<div class="icons">

<div class="icon" onclick="window.open('https://www.roblox.com','_blank')">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">
<p>Roblox</p>
</div>

<div class="icon" onclick="window.open('https://www.youtube.com','_blank')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg">
<p>YouTube</p>
</div>

</div>

</div>

<script>

const start = document.getElementById("startScreen");
const content = document.getElementById("content");

start.addEventListener("click", () => {

start.style.opacity = "0";

setTimeout(()=>{
start.style.display="none";
content.style.opacity="1";
},600);

});

</script>

</body>
</html>

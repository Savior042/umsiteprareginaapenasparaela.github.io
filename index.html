<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>teste do susaki</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* BLUR */

#blur{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(25px);
cursor:pointer;
}

/* CONTEUDO */

#content{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:60px;
margin-bottom:40px;
}

/* ICONES */

.icons{
display:flex;
gap:60px;
justify-content:center;
}

.icons img{
width:100px;
cursor:pointer;
transition:0.3s;
}

.icons img:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="./video.mp4" type="video/mp4">
</video>

<div id="blur">
Toque para continuar
</div>

<div id="content">

<h1>teste do susaki</h1>

<div class="icons">

<a href="https://www.roblox.com" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">
</a>

<a href="https://www.youtube.com" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
</a>

</div>

</div>

<script>

document.getElementById("blur").onclick = function(){

this.style.display="none"

document.getElementById("content").style.display="block"

}

</script>

</body>
</html>

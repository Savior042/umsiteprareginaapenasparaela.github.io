<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coração</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#041124,#071025);
font-family:Arial;
color:white;
overflow:hidden;
-webkit-tap-highlight-color: transparent;
}

.card{
width:90%;
max-width:360px;
text-align:center;
background:rgba(255,255,255,0.03);
padding:28px;
border-radius:16px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:5px;
}

.sub{
font-size:12px;
opacity:0.7;
margin-bottom:15px;
}

/* coração */

.heart{
font-size:90px;
cursor:pointer;
transition:.15s;
user-select:none;
display:inline-block;
padding:10px;
}

.heart:active{
transform:scale(1.25);
}

.bar{
height:16px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff3b5c,#ff8a4d);
transition:.3s;
}

#percent{
margin-top:10px;
font-weight:bold;
}

/* confete */

.confetti{
position:fixed;
width:10px;
height:10px;
animation:fall 1.5s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(600px) rotate(720deg);opacity:0}
}

/* tela final */

#final{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:1s;
padding:20px;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1519681393784-d120267933ba");

background-size:cover;
background-position:center;
}

#final.show{
opacity:1;
pointer-events:auto;
}

video{
width:95%;
max-width:700px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.8);
margin-bottom:25px;
}

/* texto final */

.finalText{
font-size:22px;
max-width:700px;
line-height:1.4;
text-shadow:0 5px 20px rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<div class="card">

<h2>um site para regina apenas para ela ❤</h2>
<div class="sub">clica no meu coracaozinho</div>

<div class="heart" id="heart">❤️</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div id="percent">0%</div>

<audio id="sound">
<source src="YTDown.com_Shorts_pinto-de-cachorro-assado_Media_O8gYAMuwQM4_001_720p-Trim.mp3">
</audio>

</div>


<div id="final">

<video id="video" autoplay playsinline controls>
<source src="YTDown.com_YouTube_Benson-Boone-Beautiful-Things-Official-M_Media_Oa_RSwwpPaA_001_1080p.mp4">
</video>

<div class="finalText">
Se você chegou até aqui, é porque alguém queria fazer algo simples…  
mas feito especialmente para você ❤
</div>

</div>


<script>

let percent=0

const heart=document.getElementById("heart")
const fill=document.getElementById("fill")
const text=document.getElementById("percent")
const final=document.getElementById("final")
const sound=document.getElementById("sound")
const video=document.getElementById("video")

function confetti(){

for(let i=0;i<50;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=["#ff3b5c","#ffd166","#22c55e","#60a5fa"][Math.floor(Math.random()*4)]

document.body.appendChild(c)

setTimeout(()=>c.remove(),1500)

}

}

heart.onclick=()=>{

if(percent>=100)return

percent=Math.min(100,percent+5)

fill.style.width=percent+"%"

text.innerText=percent+"%"

sound.currentTime=0
sound.play()

/* vibração melhor para celular */

if(navigator.vibrate){
navigator.vibrate([30])
}

/* micro animação */

heart.style.transform="scale(1.3)"
setTimeout(()=>heart.style.transform="scale(1)",120)

if(percent===100){

confetti()

setTimeout(()=>{

final.classList.add("show")

video.play()

},700)

}

}

</script>

</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Coração — Clique até 100%</title>

<style>
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Arial}
body{margin:0;background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}

.container{position:relative;width:100%;max-width:380px}

.card{text-align:center}

.heart-btn{width:120px;height:120px;margin:auto;cursor:pointer}
.heart{width:100%;transition:transform .15s}
.heart.pop{transform:scale(1.15)}

.progress-wrap{margin-top:20px;height:18px;background:#1e293b;border-radius:10px;overflow:hidden}
.progress-inner{height:100%;width:0%;background:#ff3b5c;transition:width .3s}

.percent{margin-top:10px;font-weight:bold}

/* confetti */
.confetti-piece{
position:absolute;
width:8px;
height:8px;
background:red;
animation:fall 1.5s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0);opacity:1}
100%{transform:translateY(300px) rotate(720deg);opacity:0}
}

/* second screen */
#finalScreen{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:opacity 1s;
padding:20px;
text-align:center
}

#finalScreen.show{
opacity:1;
pointer-events:auto
}

video{
max-width:90vw;
border-radius:10px;
margin-bottom:20px
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="mainCard">
<h2>Clique no coração</h2>

<div class="heart-btn" id="heartBtn">
<svg class="heart" id="heartSvg" viewBox="0 0 24 24">
<path fill="#ff3b5c" d="M12 21s-7.5-4.873-10.5-8.25C-0.3 8.76 3.3 4 7.5 6.75 9.3 8 12 10.5 12 10.5s2.7-2.5 4.5-3.75C20.7 4 24.3 8.76 22.5 12.75 19.5 16.127 12 21 12 21z"/>
</svg>
</div>

<div class="progress-wrap">
<div class="progress-inner" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>
</div>

</div>

<!-- final screen -->
<div id="finalScreen">

<video id="finalVideo" controls>
<source src="YTDown.com_YouTube_Benson-Boone-Beautiful-Things-Official-M_Media_Oa_RSwwpPaA_001_1080p.mp4" type="video/mp4">
</video>

<p>
Texto de teste: Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
</p>

</div>

<script>
const heartBtn=document.getElementById("heartBtn")
const heart=document.getElementById("heartSvg")
const progress=document.getElementById("progress")
const percentText=document.getElementById("percent")
const finalScreen=document.getElementById("finalScreen")

let percent=0

function createConfetti(){
for(let i=0;i<40;i++){
const c=document.createElement("div")
c.className="confetti-piece"
c.style.left=Math.random()*100+"vw"
c.style.background=["#ff3b5c","#ffd166","#22c55e","#60a5fa"][Math.floor(Math.random()*4)]
document.body.appendChild(c)
setTimeout(()=>c.remove(),1500)
}
}

heartBtn.onclick=()=>{
if(percent>=100)return

percent+=5

progress.style.width=percent+"%"
percentText.textContent=percent+"%"

heart.classList.remove("pop")
void heart.offsetWidth
heart.classList.add("pop")

/* vibração celular */
if(navigator.vibrate){
navigator.vibrate(50)
}

if(percent>=100){
createConfetti()

setTimeout(()=>{
finalScreen.classList.add("show")
},700)
}
}
</script>

</body>
</html>

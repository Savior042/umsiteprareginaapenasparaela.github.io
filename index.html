<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>um site para regina apenas para ela ❤</title>
<style>
  :root{--bg1:#041124;--bg2:#071025}
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#fff}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:380px;background:rgba(255,255,255,0.03);padding:22px;border-radius:14px;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.45);text-align:center}
  h2{font-size:18px;margin:0 0 6px}
  .sub{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:12px}
  .heart{font-size:84px;cursor:pointer;display:inline-block;user-select:none;transition:transform .12s}
  .heart:active{transform:scale(1.2)}
  .bar{height:14px;background:#16202b;border-radius:10px;overflow:hidden;margin-top:18px}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#ff3b5c,#ff8a4d);transition:width .28s}
  #percent{margin-top:10px;font-weight:700}
  /* confetti */
  .confetti{position:fixed;width:10px;height:10px;animation:confettiMove 1.2s linear forwards}
  @keyframes confettiMove {0%{transform:translateY(-10px)}100%{transform:translateY(520px) rotate(720deg);opacity:0}}
  /* final screen */
  #final{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 16px;opacity:0;pointer-events:none;transition:opacity .8s;overflow:auto;
    background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.7)), url("https://images.unsplash.com/photo-1519681393784-d120267933ba");
    background-size:cover;background-position:center}
  #final.show{opacity:1;pointer-events:auto}
  video{width:100%;max-width:900px;border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.6);margin-bottom:18px}
  .finalText{width:100%;max-width:900px;color:#fff;font-size:16px;line-height:1.5;text-align:left}
  .finalText img{width:100%;max-width:900px;border-radius:12px;margin:14px 0;display:block}
  /* responsive tweaks */
  @media(max-width:420px){
    .card{padding:18px;border-radius:12px}
    .heart{font-size:76px}
    h2{font-size:16px}
    .finalText{font-size:15px}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card" id="card">
    <h2>um site para regina apenas para ela ❤</h2>
    <div class="sub">clica no meu coracaozinho</div>

    <div class="heart" id="heart" role="button" aria-pressed="false">❤️</div>

    <div class="bar" aria-hidden="false" style="margin-top:18px">
      <div class="fill" id="fill"></div>
    </div>

    <div id="percent">0%</div>

    <!-- áudio do clique (nome EXATO do arquivo no repo) -->
    <audio id="sound" preload="auto">
      <source src="YTDown.com_Shorts_pinto-de-cachorro-assado_Media_O8gYAMuwQM4_001_720p-Trim.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<!-- tela final: aparece quando o contador chega a 100% -->
<div id="final" aria-hidden="true">
  <video id="video" controls playsinline>
    <source src="YTDown.com_YouTube_Benson-Boone-Beautiful-Things-Official-M_Media_Oa_RSwwpPaA_001_1080p.mp4" type="video/mp4">
  </video>

  <div class="finalText" id="finalText">
    <p>OWAIDWADIAODWAIOI MWUBEM, CWMO VC TA??</p>

    <p>eu criei esse site bem tuff para me abrir o máximo possível com vc okok (mtmt aura ...</p>

    <p>eu ouvi que vse ama tomates?</p>

    <!-- AQUI: srcs apontam para os arquivos que você fez upload com esses nomes -->
    <img src="imagem1.png" alt="imagem 1">
    <img src="imagem2.png" alt="imagem 2">

    <p>rsrssrsrsrsr gwstou dos meus tomates mwu benzinho??</p>

    <img src="imagem3.png" alt="imagem 3">
  </div>
</div>

<script>
  // comportamento do clique/contagem/efeitos
  let percent = 0;
  const heart = document.getElementById('heart');
  const fill = document.getElementById('fill');
  const percentText = document.getElementById('percent');
  const final = document.getElementById('final');
  const sound = document.getElementById('sound');

  function createConfetti(){
    const colors = ['#ff3b5c','#ffd166','#22c55e','#60a5fa'];
    for(let i=0;i<40;i++){
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.width = (6 + Math.random()*10) + 'px';
      el.style.height = (8 + Math.random()*12) + 'px';
      el.style.animationDelay = (Math.random()*200) + 'ms';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1400 + Math.random()*600);
    }
  }

  heart.addEventListener('click', ()=>{
    if(percent >= 100) return;
    percent = Math.min(100, percent + 5);
    fill.style.width = percent + '%';
    percentText.textContent = percent + '%';

    // som (protege erros)
    try{ sound.currentTime = 0; sound.play().catch(()=>{}); } catch(e){}

    // vibração
    if(navigator.vibrate) try{ navigator.vibrate(30); } catch(e){}

    // micro-ani
    heart.style.transform = 'scale(1.25)';
    setTimeout(()=> heart.style.transform = '', 110);

    if(percent === 100){
      createConfetti();
      setTimeout(()=>{
        final.classList.add('show');
        final.setAttribute('aria-hidden','false');
        // tenta tocar o vídeo (usuário já interagiu)
        const v = document.getElementById('video');
        try{ v.play().catch(()=>{}); }catch(e){}
      }, 600);
    }
  });

  // --- debugging helpers (remova se quiser) ---
  // Função para checar se arquivo existe via abrir link raw no GitHub. Substitua USER e REPO abaixo se quiser testar direto aqui.
  // Ex: https://raw.githubusercontent.com/Savior042/umsitepragreginaapenasparaela.github.io/main/imagem1.png
</script>

</body>
</html>

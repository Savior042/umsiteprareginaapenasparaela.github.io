<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coração</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#071025;
color:white;
font-family:Arial;
}

.card{
text-align:center;
width:320px;
}

.heart{
font-size:80px;
cursor:pointer;
user-select:none;
transition:transform .15s;
}

.heart:active{
transform:scale(1.2);
}

.bar{
height:16px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff3b5c,#ff8a4d);
transition:.3s;
}

#percent{
margin-top:10px;
font-weight:bold;
}

/* tela final */

#final{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:1s;
}

#final.show{
opacity:1;
pointer-events:auto;
}

video{
width:90%;
max-width:500px;
margin-bottom:20px;
border-radius:10px;
}

.confetti{
position:fixed;
width:8px;
height:8px;
background:red;
animation:fall 1.2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(500px) rotate(720deg);opacity:0}
}

</style>
</head>

<body>

<div class="card">

<h2>Clique no coração</h2>

<div class="heart" id="heart">❤️</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div id="percent">0%</div>

<audio id="sound" src="som.mp3"></audio>

</div>


<div id="final">

<video controls autoplay>
<source src="video.mp4" type="video/mp4">
</video>

<p>Texto de teste aqui embaixo do vídeo. Depois você pode trocar por qualquer coisa.</p>

</div>


<script>

let percent=0

const heart=document.getElementById("heart")
const fill=document.getElementById("fill")
const text=document.getElementById("percent")
const final=document.getElementById("final")
const sound=document.getElementById("sound")

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div")
c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=["red","yellow","blue","lime"][Math.floor(Math.random()*4)]

document.body.appendChild(c)

setTimeout(()=>c.remove(),1200)

}

}

heart.onclick=()=>{

if(percent>=100)return

percent+=5

fill.style.width=percent+"%"

text.innerText=percent+"%"

sound.currentTime=0
sound.play()

if(navigator.vibrate){
navigator.vibrate(50)
}

if(percent>=100){

confetti()

setTimeout(()=>{
final.classList.add("show")
},600)

}

}

</script>

</body>
</html>
